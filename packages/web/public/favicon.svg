<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- background -->
  <rect width="128" height="128" rx="28" fill="#0f172a"/>
  <!-- connection lines -->
  <line x1="40" y1="40" x2="88" y2="40" stroke="url(#g)" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="40" y1="40" x2="64" y2="88" stroke="url(#g)" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="88" y1="40" x2="64" y2="88" stroke="url(#g)" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <!-- center nexus point -->
  <circle cx="64" cy="56" r="6" fill="url(#g)" opacity="0.4"/>
  <!-- nodes -->
  <circle cx="40" cy="40" r="12" fill="url(#g)"/>
  <circle cx="88" cy="40" r="12" fill="url(#g)"/>
  <circle cx="64" cy="88" r="12" fill="url(#g)"/>
  <!-- node inner dots -->
  <circle cx="40" cy="40" r="4" fill="#0f172a"/>
  <circle cx="88" cy="40" r="4" fill="#0f172a"/>
  <circle cx="64" cy="88" r="4" fill="#0f172a"/>
</svg>
